<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remembra Dashboard</title>
    <meta name="description" content="Manage your AI memories - view, search, and organize memories stored in Remembra" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Paddle.js for billing checkout -->
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js" onerror="console.warn('Paddle.js failed to load - checkout will use fallback')"></script>
    <script>
      // Initialize Paddle (production mode)
      try {
        if (typeof Paddle !== 'undefined') {
          Paddle.Initialize({ 
            token: 'live_5d05508ad75c2fe0d5621718dbd'  // Paddle client-side token
          });
          console.log('Paddle initialized successfully');
        } else {
          console.warn('Paddle not available - checkout will redirect instead of overlay');
        }
      } catch (e) {
        console.error('Paddle initialization error:', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
