services:
  # ---------------------------------------------------------------------------
  # Remembra API
  # ---------------------------------------------------------------------------
  remembra:
    build:
      context: .
      dockerfile: Dockerfile
    image: remembra:dev
    ports:
      - "8787:8787"
    environment:
      REMEMBRA_QDRANT_URL: http://qdrant:6333
      REMEMBRA_DEBUG: "true"
      REMEMBRA_LOG_LEVEL: debug
      # Override with your actual key:
      # REMEMBRA_OPENAI_API_KEY: sk-xxx
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8787/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Qdrant – vector store
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"   # HTTP / gRPC
      - "6334:6334"   # gRPC (alternate)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
